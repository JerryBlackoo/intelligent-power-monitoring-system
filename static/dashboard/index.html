<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>巡检员智能工作台</title>
  <link rel="stylesheet" href="/dashboard-assets/styles.css">
</head>
<body class="auth-locked">
  <section class="login-screen" id="loginScreen" aria-label="巡检员登录">
    <form class="login-card" id="loginForm">
      <div class="login-mark">A</div>
      <p class="eyebrow">Inspector Access</p>
      <h2>巡检员登录</h2>
      <label class="login-field">
        <span>用户名</span>
        <input id="loginUsername" name="username" type="text" autocomplete="username" required>
      </label>
      <label class="login-field">
        <span>密码</span>
        <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
      </label>
      <p class="login-error" id="loginError" role="alert"></p>
      <button class="login-submit" id="loginSubmit" type="submit">登录</button>
    </form>
  </section>

  <main class="inspector-shell" id="inspectorShell">
    <aside class="inspector-sidebar" aria-label="巡检员功能菜单">
      <div class="sidebar-head">
        <div>
          <p class="eyebrow">Power Agent</p>
          <h1>巡检员工作台</h1>
        </div>
        <button class="sidebar-toggle" type="button" aria-label="折叠菜单">□</button>
      </div>

      <nav class="side-nav">
        <button class="side-nav-item active" type="button" data-inspector-view="agent" aria-controls="agentView" aria-selected="true">
          <span class="nav-icon">AI</span>
          <span>Agent 对话</span>
        </button>
        <button class="side-nav-item" type="button" data-inspector-view="report" aria-controls="reportView" aria-selected="false">
          <span class="nav-icon">UP</span>
          <span>Report 上传</span>
        </button>
      </nav>

      <div class="sidebar-section">
        <p>当前任务</p>
        <button class="task-pill" type="button">待处理巡检报告</button>
        <button class="task-pill" type="button">设备异常复核</button>
      </div>

      <div class="sidebar-user">
        <span class="user-avatar" id="userAvatar"></span>
        <div class="user-meta">
          <span class="user-name" id="userName">--</span>
          <span class="user-role" id="userRole">--</span>
        </div>
        <button class="logout-btn" id="logoutBtn" type="button" title="退出登录" aria-label="退出登录">退出</button>
      </div>
    </aside>

    <section class="inspector-main">
      <section class="inspector-view agent-view active" id="agentView" data-view-panel="agent" aria-label="Agent 对话界面">
        <header class="workspace-topbar">
          <div>
            <p class="eyebrow">Inspection Agent</p>
            <h2>Agent 对话</h2>
          </div>
          <button class="ghost-icon-btn" id="newChatBtn" type="button" title="新建对话" aria-label="新建对话">+</button>
        </header>

        <div class="agent-stage">
          <div class="agent-greeting">
            <p class="eyebrow">On Duty</p>
            <h3 id="agentGreeting">嗨，巡检员。开始现场问答</h3>
          </div>

          <div class="chat-thread" id="chatThread" aria-live="polite">
            <article class="chat-message assistant">
              <span>AI</span>
              <p>我可以协助整理巡检记录、解释告警原因、生成处理建议。</p>
            </article>
          </div>

          <div class="agent-attachment hidden" id="agentAttachmentName"></div>
          <form class="agent-composer" id="agentForm">
            <label class="composer-tool" aria-label="添加图片">
              <input id="agentImage" type="file" accept="image/*">
              <span>+</span>
            </label>
            <textarea id="agentInput" rows="1" placeholder="询问告警原因、处理建议或报告摘要"></textarea>
            <button class="send-btn" type="submit" aria-label="发送">↑</button>
          </form>

          <div class="agent-suggestions" aria-label="快捷提问">
            <button type="button" data-prompt="帮我总结最近一次巡检记录">总结巡检记录</button>
            <button type="button" data-prompt="这条绝缘子缺陷告警应该如何处理">告警处理建议</button>
            <button type="button" data-prompt="根据上传报告生成整改说明">生成整改说明</button>
          </div>
        </div>
      </section>

      <section class="inspector-view report-view" id="reportView" data-view-panel="report" aria-label="Report 上传界面" hidden>
        <header class="workspace-topbar">
          <div>
            <p class="eyebrow">Inspection Report</p>
            <h2>Report 上传</h2>
          </div>
          <span class="upload-state" id="uploadState">待上传</span>
        </header>

        <div class="report-grid">
          <form class="upload-panel" id="reportForm">
            <label class="dropzone" id="dropzone">
              <input id="reportFile" name="report_file" type="file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.txt">
              <span class="dropzone-icon">UP</span>
              <strong id="selectedFileName">选择巡检报告文件</strong>
              <small>PDF、Word、图片或文本</small>
            </label>

            <div class="report-fields">
              <label>
                <span>设备编号</span>
                <input id="reportDevice" type="text" placeholder="cabinet_01">
              </label>
              <label>
                <span>巡检记录编号</span>
                <input id="reportRecord" type="text" placeholder="rec_019">
              </label>
              <label>
                <span>处理状态</span>
                <select id="reportStatus">
                  <option value="reviewing">复核中</option>
                  <option value="resolved">已处理</option>
                  <option value="pending">待处理</option>
                </select>
              </label>
              <label class="wide-field">
                <span>现场说明</span>
                <textarea id="reportNote" rows="5" placeholder="填写巡检员现场检查结果、处理过程或补充说明"></textarea>
              </label>
            </div>

            <button class="primary-action" id="reportSubmit" type="submit">提交 Report</button>
          </form>

          <aside class="report-side">
            <div class="report-card">
              <span>今日上传</span>
              <strong id="uploadCount">0</strong>
            </div>
            <div class="report-card">
              <span>当前巡检员</span>
              <strong id="reportInspectorName">--</strong>
            </div>
            <div class="upload-list" id="uploadList">
              <p>暂无上传记录</p>
            </div>
          </aside>
        </div>
      </section>
    </section>
  </main>

  <script src="/dashboard-assets/app.js"></script>
</body>
</html>
